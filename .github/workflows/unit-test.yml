name: unit-test

on:
  pull_request:

jobs:
  UnitTest:
    runs-on: macos-14
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 15
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        working-directory: src
        bundler-cache: true
    - name: Test
      run: cd src && bundle exec fastlane ios unittests
    #- name: Display Test Results
    #  uses: test-summary/action@v2
    #  if: always()
    #  with:
    #    paths: "src/fastlane/test_output/report.junit"
    #- name: Test Report
    #  uses: dorny/test-reporter@v1
    #  if: always()
    #  with:
    #    name: Unit Tests
    #    path: src/fastlane/test_output/report.junit
    #    reporter: jest-junit
    #- name: Test Report
    #  uses: mikepenz/action-junit-report@v4
    #  if: success() || failure() # always run even if the previous step fails
    #  with:
    #    report_paths: 'src/fastlane/test_output/report.junit'
    - name: Report
      uses: kishikawakatsumi/xcresulttool@v1
      if: always()
      with:
        path: src/fastlane/test_output/Tests.xcresult